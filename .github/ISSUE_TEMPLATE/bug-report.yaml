name: 🐛 Bug Report
description: Report a glitch or error in one of our apps
title: "[Bug]: "
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
  - type: dropdown
    id: app
    attributes:
      label: Which app are you using?
      description: Select the Northfield app where you found the bug.
      options:
        - "Formerly Free"
        - "Vault Todo"
        - "Other / General"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: e.g., v1.2.3
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we find this bug ourselves?
      placeholder: |
        1. Open the app
        2. Click on settings
        3. App crashes
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Messages
      description: Copy and paste any errors here.
      render: shell
